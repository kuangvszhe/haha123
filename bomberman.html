<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>炸弹人 - HTML5</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial; }
  .game-container { background: #16213e; padding: 20px; border-radius: 10px; box-shadow: 0 0 30px rgba(0,255,255,0.3); }
  canvas { display: block; margin: 0 auto; border: 2px solid #0f3460; border-radius: 4px; }
  .controls { color: #e94560; text-align: center; margin-top: 12px; font-size: 14px; }
  .controls kbd { background: #0f3460; padding: 4px 8px; border-radius: 4px; color: #fff; font-size: 13px; }
  .status { color: #fff; text-align: center; margin-top: 8px; font-size: 16px; }
</style></head>
<body>
<div class="game-container">
  <canvas id="game" width="416" height="416"></canvas>
  <div class="controls"><kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 移动 · <kbd>空格</kbd> 放炸弹</div>
  <div class="status" id="status">🎮 炸弹人 - 炸掉所有砖墙!</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const TILE = 32, ROWS = 13, COLS = 13;
const tileMap = [];
for (let r = 0; r < ROWS; r++) {
  tileMap[r] = [];
  for (let c = 0; c < COLS; c++) {
    if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) tileMap[r][c] = 1;
    else if (r % 2 === 0 && c % 2 === 0) tileMap[r][c] = 1;
    else if (Math.random() < 0.4 && !(r===1&&c===1) && !(r===1&&c===2) && !(r===2&&c===1)) tileMap[r][c] = 2;
    else tileMap[r][c] = 0;
  }
}
let player = { x: 1, y: 1 };
let bombs = [], explosions = [];
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; if(e.key === ' ') { e.preventDefault(); placeBomb(); } });
document.addEventListener('keyup', e => { keys[e.key] = false; });
function placeBomb() {
  const bx = Math.round(player.x), by = Math.round(player.y);
  if (tileMap[by][bx] !== 0 || bombs.some(b => b.x === bx && b.y === by)) return;
  bombs.push({ x: bx, y: by, timer: 120 });
}
function explodeBomb(bomb) {
  explosions.push({ x: bomb.x, y: bomb.y, timer: 15 });
  const dirs = [[0,0],[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    const nx = bomb.x + dx, ny = bomb.y + dy;
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && tileMap[ny][nx] !== 1) {
      explosions.push({ x: nx, y: ny, timer: 15 });
      if (tileMap[ny][nx] === 2) tileMap[ny][nx] = 0;
    }
  }
}
function update() {
  let dx = 0, dy = 0;
  if (keys['ArrowUp']||keys['w']) dy = -1;
  else if (keys['ArrowDown']||keys['s']) dy = 1;
  else if (keys['ArrowLeft']||keys['a']) dx = -1;
  else if (keys['ArrowRight']||keys['d']) dx = 1;
  if (dx !== 0 || dy !== 0) {
    const nx = player.x + dx * 0.1, ny = player.y + dy * 0.1;
    let blocked = false;
    for (let r = 0; r < ROWS && !blocked; r++)
      for (let c = 0; c < COLS && !blocked; c++)
        if (tileMap[r][c] > 0) {
          const px = nx * TILE, py = ny * TILE, cx = c * TILE, cy = r * TILE;
          if (px+4 < cx+TILE && px+TILE-4 > cx && py+4 < cy+TILE && py+TILE-4 > cy) blocked = true;
        }
    if (!blocked) { player.x = nx; player.y = ny; }
  }
  for (let i = bombs.length-1; i >= 0; i--) {
    bombs[i].timer--;
    if (bombs[i].timer <= 0) { explodeBomb(bombs[i]); bombs.splice(i, 1); }
  }
  for (let i = explosions.length-1; i >= 0; i--) {
    explosions[i].timer--;
    if (explosions[i].timer <= 0) explosions.splice(i, 1);
  }
  if (!tileMap.some(r => r.some(c => c === 2)))
    document.getElementById('status').textContent = '🎉 你赢了! 按 F5 再来一局';
}
function draw() {
  ctx.clearRect(0, 0, 416, 416);
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const t = tileMap[r][c];
      if (t === 1) { ctx.fillStyle='#0f3460'; ctx.fillRect(c*TILE,r*TILE,TILE,TILE); }
      else if (t === 2) { ctx.fillStyle='#533483'; ctx.fillRect(c*TILE,r*TILE,TILE,TILE); ctx.strokeStyle='#e94560'; ctx.strokeRect(c*TILE+2,r*TILE+2,TILE-4,TILE-4); }
      else { ctx.fillStyle='#1a1a2e'; ctx.fillRect(c*TILE,r*TILE,TILE,TILE); }
    }
  ctx.fillStyle='#222';
  for (const b of bombs) {
    ctx.beginPath(); ctx.arc(b.x*TILE+16,b.y*TILE+16,10+Math.sin(b.timer*0.2)*2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e94560'; ctx.beginPath(); ctx.arc(b.x*TILE+16,b.y*TILE+16,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222';
  }
  ctx.fillStyle='#ff6b35';
  for (const e of explosions) {
    ctx.fillRect(e.x*TILE+4,e.y*TILE+4,TILE-8,TILE-8);
    ctx.fillStyle='#ffd700'; ctx.fillRect(e.x*TILE+10,e.y*TILE+10,TILE-20,TILE-20);
    ctx.fillStyle='#ff6b35';
  }
  ctx.fillStyle='#4ecca3'; ctx.fillRect(player.x*TILE+4,player.y*TILE+4,TILE-8,TILE-8);
  ctx.fillStyle='#fff'; ctx.fillRect(player.x*TILE+8,player.y*TILE+8,6,6); ctx.fillRect(player.x*TILE+22,player.y*TILE+8,6,6);
  ctx.fillStyle='#222'; ctx.fillRect(player.x*TILE+6,player.y*TILE+20,TILE-12,4);
  requestAnimationFrame(draw);
}
setInterval(update, 50);
draw();
</script></body></html>
